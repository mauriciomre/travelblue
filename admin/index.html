<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Admin — Travel Blue Argentina</title>
        <style>
            :root {
                --blue: #003087;
                --blue2: #0055b3;
                --pale: #e8f0fb;
                --red: #c62828;
                --green: #2e7d32;
                --bg: #f0f4f8;
                --border: #e0e0e0;
                --muted: #666;
            }
            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }
            body {
                font-family: "Segoe UI", system-ui, sans-serif;
                background: var(--bg);
                color: #1a1a1a;
            }
            header {
                background: var(--blue);
                color: #fff;
                padding: 14px 24px;
                display: flex;
                justify-content: space-between;
                align-items: center;
            }
            header h1 {
                font-size: 18px;
                font-weight: 800;
            }
            .logout {
                background: rgba(255, 255, 255, 0.15);
                border: none;
                color: #fff;
                padding: 7px 14px;
                border-radius: 8px;
                cursor: pointer;
                font-size: 13px;
            }
            .logout:hover {
                background: rgba(255, 255, 255, 0.25);
            }
            .wrap {
                max-width: 1100px;
                margin: 0 auto;
                padding: 20px;
            }
            .toolbar {
                display: flex;
                gap: 10px;
                margin-bottom: 20px;
                flex-wrap: wrap;
                align-items: center;
            }
            .toolbar input,
            .toolbar select {
                padding: 9px 13px;
                border: 1.5px solid var(--border);
                border-radius: 8px;
                font-size: 14px;
                outline: none;
            }
            .toolbar input {
                flex: 1;
                min-width: 200px;
            }
            .btn {
                padding: 9px 18px;
                border: none;
                border-radius: 8px;
                font-size: 14px;
                font-weight: 700;
                cursor: pointer;
            }
            .btn-primary {
                background: var(--blue);
                color: #fff;
            }
            .btn-primary:hover {
                background: var(--blue2);
            }
            .btn-danger {
                background: var(--red);
                color: #fff;
                padding: 6px 12px;
                font-size: 12px;
            }
            .btn-edit {
                background: var(--pale);
                color: var(--blue);
                padding: 6px 12px;
                font-size: 12px;
            }
            .btn-import {
                background: #ff6f00;
                color: #fff;
            }
            table {
                width: 100%;
                border-collapse: collapse;
                background: #fff;
                border-radius: 12px;
                overflow: hidden;
                box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08);
            }
            th {
                background: var(--blue);
                color: #fff;
                padding: 11px 14px;
                text-align: left;
                font-size: 13px;
            }
            td {
                padding: 10px 14px;
                border-bottom: 1px solid var(--border);
                font-size: 13px;
                vertical-align: middle;
            }
            tr:last-child td {
                border-bottom: none;
            }
            tr:hover td {
                background: #fafbff;
            }
            .badge-disp {
                background: #e8f5e9;
                color: var(--green);
                padding: 3px 10px;
                border-radius: 10px;
                font-size: 11px;
                font-weight: 700;
            }
            .badge-agot {
                background: #ffebee;
                color: var(--red);
                padding: 3px 10px;
                border-radius: 10px;
                font-size: 11px;
                font-weight: 700;
            }
            .actions {
                display: flex;
                gap: 6px;
            }
            .modal-bg {
                display: none;
                position: fixed;
                inset: 0;
                background: rgba(0, 0, 0, 0.5);
                z-index: 100;
                align-items: center;
                justify-content: center;
            }
            .modal-bg.open {
                display: flex;
            }
            .modal {
                background: #fff;
                border-radius: 14px;
                padding: 28px;
                width: min(520px, 95vw);
                max-height: 90vh;
                overflow-y: auto;
            }
            .modal h2 {
                font-size: 17px;
                font-weight: 800;
                margin-bottom: 20px;
                color: var(--blue);
            }
            .field {
                margin-bottom: 14px;
            }
            .field label {
                display: block;
                font-size: 12px;
                font-weight: 700;
                color: var(--muted);
                margin-bottom: 5px;
                text-transform: uppercase;
            }
            .field input,
            .field select {
                width: 100%;
                padding: 10px 13px;
                border: 1.5px solid var(--border);
                border-radius: 8px;
                font-size: 14px;
                outline: none;
            }
            .field input:focus,
            .field select:focus {
                border-color: var(--blue);
            }
            .row2 {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 12px;
            }
            .modal-foot {
                display: flex;
                gap: 10px;
                justify-content: flex-end;
                margin-top: 20px;
            }
            .login-wrap {
                display: flex;
                align-items: center;
                justify-content: center;
                min-height: 100vh;
                background: var(--bg);
            }
            .login-box {
                background: #fff;
                border-radius: 16px;
                padding: 36px;
                width: 340px;
                box-shadow: 0 4px 24px rgba(0, 48, 135, 0.12);
            }
            .login-box h2 {
                color: var(--blue);
                font-size: 20px;
                font-weight: 800;
                margin-bottom: 6px;
            }
            .login-box p {
                color: var(--muted);
                font-size: 13px;
                margin-bottom: 24px;
            }
            .login-box input {
                width: 100%;
                padding: 11px 14px;
                border: 1.5px solid var(--border);
                border-radius: 9px;
                font-size: 14px;
                outline: none;
                margin-bottom: 12px;
            }
            .login-box input:focus {
                border-color: var(--blue);
            }
            .login-box button {
                width: 100%;
                padding: 12px;
                background: var(--blue);
                color: #fff;
                border: none;
                border-radius: 9px;
                font-size: 15px;
                font-weight: 700;
                cursor: pointer;
            }
            .login-box button:hover {
                background: var(--blue2);
            }
            .err {
                color: var(--red);
                font-size: 13px;
                margin-top: 8px;
                text-align: center;
            }
            .stats {
                display: flex;
                gap: 12px;
                margin-bottom: 20px;
                flex-wrap: wrap;
            }
            .stat {
                background: #fff;
                border-radius: 10px;
                padding: 14px 20px;
                flex: 1;
                min-width: 120px;
                box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06);
            }
            .stat-n {
                font-size: 28px;
                font-weight: 800;
                color: var(--blue);
            }
            .stat-l {
                font-size: 12px;
                color: var(--muted);
                margin-top: 2px;
            }
            .toast {
                position: fixed;
                bottom: 24px;
                right: 24px;
                background: #333;
                color: #fff;
                padding: 12px 20px;
                border-radius: 10px;
                font-size: 14px;
                z-index: 999;
                opacity: 0;
                transition: opacity 0.3s;
            }
            .toast.show {
                opacity: 1;
            }
        </style>
    </head>
    <body>
        <div class="login-wrap" id="loginWrap">
            <div class="login-box">
                <h2>Travel Blue Admin</h2>
                <p>Ingresá tus credenciales para continuar</p>
                <input type="text" id="luser" placeholder="Usuario" />
                <input
                    type="password"
                    id="lpass"
                    placeholder="Contraseña"
                    onkeydown="if (event.key === 'Enter') doLogin();"
                />
                <button onclick="doLogin()">Ingresar</button>
                <div class="err" id="lerr"></div>
            </div>
        </div>

        <div id="appWrap" style="display: none">
            <header>
                <h1>🧳 Travel Blue — Panel Admin</h1>
                <button class="logout" onclick="doLogout()">
                    Cerrar sesión
                </button>
            </header>
            <div class="wrap">
                <div class="stats">
                    <div class="stat">
                        <div class="stat-n" id="stTotal">—</div>
                        <div class="stat-l">Productos</div>
                    </div>
                    <div class="stat">
                        <div class="stat-n" id="stDisp">—</div>
                        <div class="stat-l">Disponibles</div>
                    </div>
                    <div class="stat">
                        <div class="stat-n" id="stAgot">—</div>
                        <div class="stat-l">Agotados</div>
                    </div>
                    <div class="stat">
                        <div class="stat-n" id="stCats">—</div>
                        <div class="stat-l">Categorías</div>
                    </div>
                </div>
                <div class="toolbar">
                    <input
                        type="text"
                        id="srch"
                        placeholder="🔍 Buscar por nombre o código..."
                        oninput="filterTable()"
                    />
                    <select id="filtCat" onchange="filterTable()">
                        <option value="">Todas las categorías</option>
                    </select>
                    <select id="filtEst" onchange="filterTable()">
                        <option value="">Todos los estados</option>
                        <option value="DISPONIBLE">Disponible</option>
                        <option value="AGOTADO">Agotado</option>
                    </select>
                    <button class="btn btn-primary" onclick="openModal()">
                        + Nuevo producto
                    </button>
                    <button class="btn btn-import" onclick="importarData()">
                        ⬆ Importar datos iniciales
                    </button>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>Código</th>
                            <th>Descripción</th>
                            <th>Categoría</th>
                            <th>Mayorista</th>
                            <th>PVP</th>
                            <th>Estado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tbody"></tbody>
                </table>
            </div>
        </div>

        <div class="modal-bg" id="modalBg">
            <div class="modal">
                <h2 id="modalTitle">Nuevo producto</h2>
                <input type="hidden" id="fId" />
                <div class="row2">
                    <div class="field">
                        <label>Código</label><input id="fCodigo" />
                    </div>
                    <div class="field">
                        <label>Categoría</label><input id="fCategoria" />
                    </div>
                </div>
                <div class="field">
                    <label>Descripción</label><input id="fDesc" />
                </div>
                <div class="row2">
                    <div class="field">
                        <label>Precio Mayorista ($)</label
                        ><input id="fMay" type="number" />
                    </div>
                    <div class="field">
                        <label>PVP Sugerido ($)</label
                        ><input id="fPvp" type="number" />
                    </div>
                </div>
                <div class="field">
                    <label>URL Foto</label><input id="fFoto" />
                </div>
                <div class="row2">
                    <div class="field">
                        <label>Estado</label>
                        <select id="fEstado">
                            <option value="DISPONIBLE">Disponible</option>
                            <option value="AGOTADO">Agotado</option>
                        </select>
                    </div>
                    <div class="field">
                        <label>Orden</label
                        ><input id="fOrden" type="number" value="0" />
                    </div>
                </div>
                <div class="modal-foot">
                    <button
                        class="btn"
                        style="background: #eee"
                        onclick="closeModal()"
                    >
                        Cancelar
                    </button>
                    <button class="btn btn-primary" onclick="saveProduct()">
                        Guardar
                    </button>
                </div>
            </div>
        </div>

        <div class="toast" id="toast"></div>

        <script>
            var API = "../api.php";
            var authUser = "",
                authPass = "";
            var allProducts = [];

            async function doLogin() {
                var u = document.getElementById("luser").value.trim();
                var p = document.getElementById("lpass").value.trim();
                if (!u || !p) {
                    document.getElementById("lerr").textContent =
                        "Completá los campos";
                    return;
                }
                var res = await fetch(API + "?action=login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ user: u, pass: p }),
                });
                if (res.ok) {
                    authUser = u;
                    authPass = p;
                    document.getElementById("loginWrap").style.display = "none";
                    document.getElementById("appWrap").style.display = "block";
                    loadProducts();
                } else {
                    document.getElementById("lerr").textContent =
                        "Usuario o contraseña incorrectos";
                }
            }

            function doLogout() {
                authUser = "";
                authPass = "";
                location.reload();
            }

            async function loadProducts() {
                var res = await fetch(API + "?action=productos");
                allProducts = await res.json();
                renderStats();
                renderCatFilter();
                renderTable(allProducts);
            }

            function renderStats() {
                document.getElementById("stTotal").textContent =
                    allProducts.length;
                document.getElementById("stDisp").textContent =
                    allProducts.filter((p) => p.estado === "DISPONIBLE").length;
                document.getElementById("stAgot").textContent =
                    allProducts.filter((p) => p.estado === "AGOTADO").length;
                document.getElementById("stCats").textContent = [
                    ...new Set(allProducts.map((p) => p.categoria)),
                ].length;
            }

            function renderCatFilter() {
                var cats = [
                    ...new Set(allProducts.map((p) => p.categoria)),
                ].sort();
                var sel = document.getElementById("filtCat");
                sel.innerHTML =
                    '<option value="">Todas las categorías</option>';
                cats.forEach((c) => {
                    var o = document.createElement("option");
                    o.value = c;
                    o.textContent = c;
                    sel.appendChild(o);
                });
            }

            function filterTable() {
                var q = document.getElementById("srch").value.toLowerCase();
                var cat = document.getElementById("filtCat").value;
                var est = document.getElementById("filtEst").value;
                renderTable(
                    allProducts.filter(
                        (p) =>
                            (!q ||
                                p.descripcion.toLowerCase().includes(q) ||
                                p.codigo.toLowerCase().includes(q)) &&
                            (!cat || p.categoria === cat) &&
                            (!est || p.estado === est),
                    ),
                );
            }

            function fmt(v) {
                return v
                    ? "$ " + Math.round(parseFloat(v)).toLocaleString("es-AR")
                    : "—";
            }

            function renderTable(list) {
                var html = "";
                list.forEach(function (p) {
                    html += "<tr>";
                    html += "<td><code>" + p.codigo + "</code></td>";
                    html += "<td>" + p.descripcion + "</td>";
                    html += "<td>" + p.categoria + "</td>";
                    html += "<td>" + fmt(p.precio_mayorista) + "</td>";
                    html += "<td>" + fmt(p.pvp) + "</td>";
                    html +=
                        '<td><span class="badge-' +
                        (p.estado === "DISPONIBLE" ? "disp" : "agot") +
                        '">' +
                        p.estado +
                        "</span></td>";
                    html += '<td><div class="actions">';
                    html +=
                        '<button class="btn btn-edit" onclick="editProduct(' +
                        p.id +
                        ')">✏ Editar</button>';
                    html +=
                        '<button class="btn btn-danger" onclick="deleteProduct(' +
                        p.id +
                        ",'" +
                        p.descripcion.replace(/'/g, "") +
                        "')\">🗑</button>";
                    html += "</div></td></tr>";
                });
                document.getElementById("tbody").innerHTML =
                    html ||
                    '<tr><td colspan="7" style="text-align:center;color:#aaa;padding:30px">No hay productos</td></tr>';
            }

            function openModal(p) {
                document.getElementById("modalTitle").textContent = p
                    ? "Editar producto"
                    : "Nuevo producto";
                document.getElementById("fId").value = p ? p.id : "";
                document.getElementById("fCodigo").value = p ? p.codigo : "";
                document.getElementById("fCategoria").value = p
                    ? p.categoria
                    : "";
                document.getElementById("fDesc").value = p ? p.descripcion : "";
                document.getElementById("fMay").value = p
                    ? p.precio_mayorista
                    : "";
                document.getElementById("fPvp").value = p ? p.pvp || "" : "";
                document.getElementById("fFoto").value = p ? p.foto || "" : "";
                document.getElementById("fEstado").value = p
                    ? p.estado
                    : "DISPONIBLE";
                document.getElementById("fOrden").value = p ? p.orden || 0 : 0;
                document.getElementById("modalBg").classList.add("open");
            }

            function closeModal() {
                document.getElementById("modalBg").classList.remove("open");
            }
            function editProduct(id) {
                openModal(allProducts.find((p) => p.id === id));
            }

            async function saveProduct() {
                var id = document.getElementById("fId").value;
                var data = {
                    _user: authUser,
                    _pass: authPass,
                    codigo: document.getElementById("fCodigo").value.trim(),
                    descripcion: document.getElementById("fDesc").value.trim(),
                    categoria: document
                        .getElementById("fCategoria")
                        .value.trim()
                        .toUpperCase(),
                    precio_mayorista:
                        parseFloat(document.getElementById("fMay").value) || 0,
                    pvp:
                        parseFloat(document.getElementById("fPvp").value) ||
                        null,
                    foto: document.getElementById("fFoto").value.trim() || null,
                    estado: document.getElementById("fEstado").value,
                    orden:
                        parseInt(document.getElementById("fOrden").value) || 0,
                };
                if (!data.codigo || !data.descripcion || !data.categoria) {
                    toast("Completá los campos obligatorios", "#c62828");
                    return;
                }
                var action = id ? "editar&id=" + id : "producto";
                var res = await fetch(API + "?action=" + action, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(data),
                });
                var json = await res.json();
                if (json.ok) {
                    toast(id ? "Producto actualizado" : "Producto creado");
                    closeModal();
                    loadProducts();
                } else
                    toast("Error: " + (json.error || "desconocido"), "#c62828");
            }

            async function deleteProduct(id, name) {
                if (!confirm('¿Eliminar "' + name + '"?')) return;
                var res = await fetch(API + "?action=eliminar&id=" + id, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ _user: authUser, _pass: authPass }),
                });
                var json = await res.json();
                if (json.ok) {
                    toast("Producto eliminado");
                    loadProducts();
                }
            }

            async function importarData() {
                if (
                    !confirm(
                        "Importar los productos del catálogo original a la base de datos.\n¿Continuar?",
                    )
                )
                    return;
                var res = await fetch(API + "?action=importar", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        creds: { user: authUser, pass: authPass },
                        productos: DATA_INICIAL,
                    }),
                });
                var json = await res.json();
                toast("Importados: " + json.imported + " productos");
                loadProducts();
            }

            function toast(msg, bg) {
                var t = document.getElementById("toast");
                t.textContent = msg;
                t.style.background = bg || "#2e7d32";
                t.classList.add("show");
                setTimeout(() => t.classList.remove("show"), 3000);
            }
