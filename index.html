<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
        />
        <title>Travel Blue Argentina — Catálogo Mayorista</title>
        <link rel="stylesheet" href="assets/css/catalogo.css" />
    </head>
    <body>
        <header>
            <div class="h-top">
                <div class="brand">
                    <img
                        src="imgs/logo_tb.png"
                        alt="Travel Blue Argentina"
                        style="height: 40px; filter: brightness(0) invert(1)"
                    />
                    <small>CATÁLOGO MAYORISTA</small>
                </div>
                <div class="h-right">
                    <div class="h-right-top">
                        <a class="admin-btn" href="admin/"
                            >⚙ <span class="admin-txt">Admin</span></a
                        >
                        <div class="view-btns">
                            <button
                                class="view-btn on"
                                id="btnGrid"
                                onclick="setView('grid')"
                                title="Vista grilla"
                            >
                                ⊞
                            </button>
                            <button
                                class="view-btn"
                                id="btnList"
                                onclick="setView('list')"
                                title="Vista lista"
                            >
                                ☰
                            </button>
                        </div>
                    </div>
                    <div class="h-right-bottom">
                        <button class="cart-btn" onclick="openCart()">
                            🛒 Mi pedido
                            <div class="cart-n" id="cartN">0</div>
                        </button>
                    </div>
                </div>
            </div>
            <div class="search">
                <input
                    type="text"
                    id="srch"
                    placeholder="🔍  Buscar por nombre o código..."
                    oninput="doSearch()"
                />
            </div>
        </header>

        <div class="tabs" id="tabs"></div>
        <div
            class="cat-dropdown-wrap"
            id="catDropdownWrap"
            style="display: none"
        >
            <button
                class="cat-dropdown-btn"
                id="catDropdownBtn"
                onclick="toggleCatDropdown()"
            >
                <span id="catDropdownLabel">TODOS</span> ▾
            </button>
            <div class="cat-dropdown-menu" id="catDropdownMenu"></div>
        </div>
        <div class="body" id="prods">
            <div class="loading">
                <div class="spin"></div>
                Cargando catálogo...
            </div>
        </div>

        <div class="overlay" id="overlay" onclick="bgClose(event)">
            <div class="panel">
                <div class="p-head">
                    <h2>📋 Mi pedido</h2>
                    <button class="cls" onclick="closeCart()">×</button>
                </div>

                <!-- ZONA 1: productos (scroll independiente) -->
                <div class="p-products">
                    <!-- Toggle (solo mobile) -->
                    <button
                        class="cart-section-toggle"
                        id="toggleItemsBtn"
                        onclick="toggleCartSection('items')"
                    >
                        <span id="toggleItemsLabel"
                            >▼ Ver productos del pedido</span
                        >
                    </button>
                    <div
                        class="cart-items-section mobile-collapsed"
                        id="cartItemsSection"
                    >
                        <div id="pitems"></div>
                    </div>
                </div>

                <!-- ZONA 2: total + formulario (scroll independiente) -->
                <div class="p-form-area">
                    <div id="cartToast" class="cart-toast"></div>
                    <div class="total-row">
                        <span class="total-lbl">Total mayorista:</span
                        ><span class="total-val" id="ptotal">$ 0</span>
                    </div>
                    <button class="continue-btn" onclick="closeCart()">
                        ← Continuar comprando
                    </button>

                    <!-- Toggle formulario (solo mobile) -->
                    <button
                        class="cart-section-toggle"
                        id="toggleFormBtn"
                        onclick="toggleCartSection('form')"
                        style="margin-top: 4px"
                    >
                        <span id="toggleFormLabel">▼ Datos del pedido</span>
                    </button>
                    <div class="cart-section-body" id="cartFormSection">
                        <!-- TELÉFONO -->
                        <div class="field-group" style="margin-top: 8px">
                            <label class="field-lbl"
                                >Teléfono <span class="req">*</span></label
                            >
                            <div class="tel-row">
                                <input
                                    id="cCaract"
                                    type="tel"
                                    placeholder="353"
                                    maxlength="4"
                                    oninput="onTelChange()"
                                />
                                <input
                                    id="cNum"
                                    type="tel"
                                    placeholder="4140385"
                                    maxlength="8"
                                    oninput="onTelChange()"
                                />
                            </div>
                            <div class="field-hint-sm">
                                Característica sin 0 + número sin 15
                            </div>
                        </div>
                        <!-- FORMULARIO CLIENTE -->
                        <div id="clienteForm" style="display: none">
                            <div class="form-section-title">
                                Datos del pedido
                            </div>
                            <div class="field-group">
                                <label class="field-lbl"
                                    >Nombre / Razón Social
                                    <span class="req">*</span></label
                                >
                                <input
                                    id="cNombre"
                                    type="text"
                                    placeholder="Nombre o razón social"
                                />
                            </div>
                            <div class="field-row">
                                <div class="field-group">
                                    <label class="field-lbl">CUIT / DNI</label>
                                    <input
                                        id="cCuitDni"
                                        type="text"
                                        placeholder="20-12345678-9"
                                    />
                                </div>
                                <div class="field-group">
                                    <label class="field-lbl">Email</label>
                                    <input
                                        id="cEmail"
                                        type="email"
                                        placeholder="mail@ejemplo.com"
                                    />
                                </div>
                            </div>
                            <div class="form-section-title">Datos de envío</div>
                            <div class="field-group">
                                <label class="field-lbl">Domicilio</label>
                                <input
                                    id="cDomicilio"
                                    type="text"
                                    placeholder="Calle y número"
                                />
                            </div>
                            <div class="field-row">
                                <div class="field-group">
                                    <label class="field-lbl">Localidad</label>
                                    <input
                                        id="cLocalidad"
                                        type="text"
                                        placeholder="Ciudad"
                                    />
                                </div>
                                <div class="field-group">
                                    <label class="field-lbl">CP</label>
                                    <input
                                        id="cCP"
                                        type="text"
                                        placeholder="5000"
                                    />
                                </div>
                            </div>
                            <div class="field-group">
                                <label class="field-lbl">Provincia</label>
                                <input
                                    id="cProvincia"
                                    type="text"
                                    placeholder="Córdoba"
                                />
                            </div>
                            <div class="field-group">
                                <label class="field-lbl">Transporte</label>
                                <select
                                    id="cTransporte"
                                    onchange="onTransporteChange()"
                                >
                                    <option value="">— Seleccioná —</option>
                                </select>
                            </div>
                            <div
                                class="field-group"
                                id="cTransporteOtroWrap"
                                style="display: none"
                            >
                                <label class="field-lbl"
                                    >Especificá el transporte</label
                                >
                                <input
                                    id="cTransporteOtro"
                                    type="text"
                                    placeholder="Nombre del transporte"
                                />
                            </div>
                            <div class="field-group">
                                <label class="field-lbl"
                                    >Notas / Aclaraciones</label
                                >
                                <textarea
                                    id="cNotas"
                                    placeholder="Indicaciones especiales..."
                                    rows="2"
                                ></textarea>
                            </div>
                        </div>
                    </div>
                    <!-- end cartFormSection -->
                    <button class="wa" onclick="sendWA()">
                        📱 Confirmar y enviar pedido
                    </button>
                </div>
                <!-- end p-form-area -->
            </div>
        </div>

        <script src="assets/js/catalogo.js"></script>
    </body>
</html>
